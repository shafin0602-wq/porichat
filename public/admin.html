<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PoriChat Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-purple-400">PoriChat Admin Panel 🛡️</h1>
            <div class="text-xl">Online: <span id="totalOnline" class="text-green-400">0</span></div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-gray-300">Live User Monitoring</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 text-sm">
                                <th class="p-3">Socket ID</th>
                                <th class="p-3">IP Address</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userList">
                            <!-- Data will load here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const pass = prompt("Enter Admin Password:");
        if (pass !== "poriadmin786") { // আপনার পছন্দমতো পাসওয়ার্ড সেট করুন
            alert("Wrong Password!");
            window.location.href = "/";
        }

        socket.on('admin_data', (data) => {
            document.getElementById('totalOnline').innerText = data.onlineCount;
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            data.users.forEach(user => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-800 hover:bg-gray-800/50 transition";
                tr.innerHTML = `
                    <td class="p-3 text-xs font-mono text-purple-300">${user.id}</td>
                    <td class="p-3 text-xs text-gray-500">${user.ip}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold ${user.status === 'Chatting' ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500'}">
                            ${user.status}
                        </span>
                    </td>
                    <td class="p-3 flex gap-2">
                        <button onclick="kickUser('${user.id}')" class="bg-orange-600/20 text-orange-500 border border-orange-600/30 px-3 py-1 rounded text-xs hover:bg-orange-600 hover:text-white">Kick</button>
                        <button onclick="banUser('${user.id}')" class="bg-red-600/20 text-red-500 border border-red-600/30 px-3 py-1 rounded text-xs hover:bg-red-600 hover:text-white">Ban IP</button>
                    </td>
                `;
                userList.appendChild(tr);
            });
        });

        function kickUser(id) {
            if(confirm("Kick this user?")) socket.emit('admin_kick', id);
        }

        function banUser(id) {
            if(confirm("Permanently BAN this IP?")) socket.emit('admin_ban', id);
        }
    </script>
</body>
</html>
