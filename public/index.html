<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoriChat Pro🧚‍♀️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0b0e; color: #fff; }
        .gradient-btn { background: linear-gradient(90deg, #8b5cf6, #d946ef); }
        .chat-area { height: 65vh; overflow-y: auto; }
        .emoji-picker { display: none; background: #1f2937; border-radius: 10px; padding: 10px; position: absolute; bottom: 80px; left: 20px; z-index: 100; }
        .emoji-picker span { cursor: pointer; font-size: 20px; padding: 5px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2">

    <!-- Landing Screen -->
    <div id="landing" class="text-center w-full max-w-md">
        <h1 class="text-5xl font-bold mb-6">Pori<span class="text-purple-500">Chat</span></h1>
        <button onclick="startChat()" class="gradient-btn w-full py-4 rounded-2xl font-bold text-xl">Start Chatting</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-container" class="hidden w-full max-w-2xl bg-gray-900 rounded-3xl p-4 shadow-2xl relative">
        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
            <span class="text-green-400 font-bold">● Connected</span>
            <div class="flex gap-2">
                <button onclick="reportPartner()" class="bg-yellow-600/20 text-yellow-500 px-3 py-1 rounded-full text-xs">Report</button>
                <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-1 rounded-full text-xs">Exit</button>
            </div>
        </div>

        <div id="messages" class="chat-area space-y-4 p-2"></div>

        <!-- Emoji Picker -->
        <div id="emojiPicker" class="emoji-picker grid grid-cols-6 border border-gray-700">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('😘')">😘</span><span onclick="addEmoji('😮')">😮</span>
            <span onclick="addEmoji('😭')">😭</span><span onclick="addEmoji('👍')">👍</span><span onclick="addEmoji('🧚‍♀️')">🧚‍♀️</span>
        </div>

        <div class="mt-4 flex flex-wrap gap-2 items-center bg-gray-800 p-2 rounded-2xl">
            <button onclick="toggleEmoji()" class="text-2xl">😊</button>
            <label class="cursor-pointer text-2xl">
                📷 <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="uploadImage(this)">
            </label>
            <input id="msgInput" type="text" class="flex-1 bg-transparent p-2 outline-none" placeholder="Type a message...">
            <button onclick="sendMessage()" class="gradient-btn px-6 py-2 rounded-xl font-bold">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;

        function startChat() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            socket.emit('findPartner');
        }

        socket.on('matched', (room) => {
            currentRoom = room;
            appendMessage("System", "You're matched! Have fun.");
        });

        socket.on('receiveMessage', (data) => {
            if(data.type === 'text') appendMessage("Partner", data.content);
            if(data.type === 'image') appendImage("Partner", data.content);
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value && currentRoom) {
                socket.emit('newMessage', { room: currentRoom, message: input.value });
                appendMessage("You", input.value);
                input.value = '';
                document.getElementById('emojiPicker').style.display = 'none';
            }
        }

        function uploadImage(input) {
            const file = input.files[0];
            if (file && currentRoom) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Img = e.target.result;
                    socket.emit('sendImage', { room: currentRoom, image: base64Img });
                    appendImage("You", base64Img);
                };
                reader.readAsDataURL(file);
            }
        }

        function reportPartner() {
            if(confirm("Report this user?")) {
                socket.emit('reportUser');
                alert("Reported successfully.");
            }
        }

        function appendMessage(sender, msg) {
            const div = document.createElement('div');
            div.className = `p-3 rounded-xl max-w-[80%] ${sender==='You'?'bg-purple-600 ml-auto':'bg-gray-800'}`;
            div.innerHTML = `<p class="text-xs opacity-50">${sender}</p><p>${msg}</p>`;
            document.getElementById('messages').appendChild(div);
            scrollDown();
        }

        function appendImage(sender, src) {
            const div = document.createElement('div');
            div.className = `p-2 rounded-xl max-w-[80%] ${sender==='You'?'bg-purple-600 ml-auto':'bg-gray-800'}`;
            div.innerHTML = `<p class="text-xs opacity-50">${sender}</p><img src="${src}" class="rounded-lg mt-1 w-full max-h-60 object-cover">`;
            document.getElementById('messages').appendChild(div);
            scrollDown();
        }

        function toggleEmoji() {
            const p = document.getElementById('emojiPicker');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function addEmoji(emoji) {
            document.getElementById('msgInput').value += emoji;
        }

        function scrollDown() {
            const chat = document.getElementById('messages');
            chat.scrollTop = chat.scrollHeight;
        }

        socket.on('systemMsg', msg => appendMessage("System", msg));
        socket.on('banned', msg => { alert(msg); location.reload(); });
    </script>
</body>
</html>
