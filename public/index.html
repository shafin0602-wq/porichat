<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoriChat - Vanish Like a Pori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0b0b0e; color: #fff; font-family: sans-serif; }
        .pori-bg { background: linear-gradient(135deg, #1a1a2e 0%, #0b0b0e 100%); }
        .gradient-btn { background: linear-gradient(90deg, #8b5cf6, #d946ef); transition: 0.3s; }
        .gradient-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #d946ef; }
        .chat-area { height: 70vh; overflow-y: auto; scrollbar-width: none; }
        .chat-area::-webkit-scrollbar { display: none; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="pori-bg flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Landing Screen -->
    <div id="landing" class="text-center w-full max-w-md">
        <div class="mb-4 text-7xl">🧚‍♀️</div>
        <h1 class="text-5xl font-extrabold mb-2 tracking-tight">Pori<span class="text-purple-500">Chat</span></h1>
        <p class="text-gray-400 mb-10">Chat with Strangers. Vanish Like a Pori.</p>
        
        <button onclick="startChat()" class="gradient-btn w-full py-4 rounded-2xl font-bold text-xl mb-4">
            Start Chatting 1v1
        </button>
        
        <div class="grid grid-cols-2 gap-4 text-xs text-gray-500 mt-6">
            <div class="bg-gray-900/50 p-3 rounded-xl border border-gray-800">🛡️ 100% Anonymous</div>
            <div class="bg-gray-900/50 p-3 rounded-xl border border-gray-800">⚡ Instant Match</div>
        </div>
    </div>

    <!-- Matchmaking Screen -->
    <div id="matching" class="hidden text-center">
        <div class="text-7xl mb-6 pulse">🧚‍♀️</div>
        <h2 id="status" class="text-2xl font-bold text-purple-400">Summoning a Pori...</h2>
        <p class="text-gray-500 mt-2">The spirits are connecting you</p>
        <button onclick="location.reload()" class="mt-8 text-gray-400 border border-gray-700 px-6 py-2 rounded-full">Cancel</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-container" class="hidden w-full max-w-2xl bg-gray-900/30 rounded-3xl border border-gray-800 p-4 shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <span class="font-bold text-purple-400">Connected!</span>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-1 rounded-full text-sm">Next Pori</button>
        </div>
        
        <div id="messages" class="chat-area p-2 space-y-3"></div>

        <div class="mt-4 flex gap-2 bg-gray-800/50 p-2 rounded-2xl border border-gray-700">
            <input id="msgInput" type="text" class="flex-1 bg-transparent p-2 outline-none" placeholder="Say salam to Pori...">
            <button onclick="sendMessage()" class="gradient-btn px-6 py-2 rounded-xl font-bold">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;

        function startChat() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('matching').classList.remove('hidden');
            socket.emit('findPartner');
        }

        socket.on('matched', (room) => {
            currentRoom = room;
            document.getElementById('matching').classList.add('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            appendMessage("System", "You are now connected with a Pori! Be respectful.");
        });

        socket.on('receiveMessage', (msg) => {
            appendMessage("Pori", msg);
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value && currentRoom) {
                socket.emit('newMessage', { room: currentRoom, message: input.value });
                appendMessage("You", input.value);
                input.value = '';
            }
        }

        function appendMessage(sender, msg) {
            const div = document.createElement('div');
            const isMe = sender === "You";
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="${isMe ? 'bg-purple-600' : 'bg-gray-800'} px-4 py-2 rounded-2xl max-w-[80%] shadow-md">
                    <p class="text-xs ${isMe ? 'text-purple-200' : 'text-pink-400'} font-bold mb-1">${sender}</p>
                    <p class="text-sm">${msg}</p>
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            const chatArea = document.getElementById('messages');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Enter key support
        document.getElementById('msgInput').addEventListener("keyup", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
